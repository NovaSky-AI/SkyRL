name: auto-train

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no S3 writes, no sky launch)"
        required: false
        default: "false"
      skip_smoke:
        description: "Skip env smoke test"
        required: false
        default: "false"
      team_id:
        description: "Filter datasets by team_id (e.g. a1025f0b-... for fleet team, 042fd173-... for Fleet Research). Leave blank for all teams."
        required: false
        default: ""
      max_datasets:
        description: "Cap number of datasets processed this run (newest-first). 0 = unlimited."
        required: false
        default: "1"
      ignore_seed:
        description: "Treat all matching datasets as candidates (bypass seen/processed filters). For targeted testing."
        required: false
        default: "false"
      modality:
        description: "Filter to one modality (tool_use or browser_use). Leave blank for both."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: auto-train
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install \
            "boto3>=1.34" \
            "botocore>=1.34" \
            "httpx>=0.27" \
            "fleet-python<=0.2.119" \
            "skypilot[gcp,runpod,kubernetes]==0.12.2"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Write sky + RunPod config
        env:
          SKY_CONFIG_YAML: ${{ secrets.SKY_CONFIG_YAML }}
          RUNPOD_SSH_KEY: ${{ secrets.RUNPOD_SSH_KEY }}
        run: |
          mkdir -p ~/.sky ~/.ssh
          printf '%s\n' "$SKY_CONFIG_YAML" > ~/.sky/config.yaml
          printf '%s\n' "$RUNPOD_SSH_KEY" > ~/.ssh/runpod_key
          chmod 600 ~/.ssh/runpod_key
          # Match how the local config expects to find it. Some Slurm providers
          # look for ~/.ssh/runpod (the runpodctl-style file). Reuse the same key.
          cp ~/.ssh/runpod_key ~/.ssh/runpod
          chmod 600 ~/.ssh/runpod
          echo "Wrote ~/.sky/config.yaml ($(wc -c < ~/.sky/config.yaml) bytes)"

      - name: Verify sky check
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: sky check 2>&1 | tail -20 || true

      - name: Run auto-train trigger
        env:
          FLEET_API_KEY: ${{ secrets.FLEET_API_KEY }}
          WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_AUTO_TRAIN_CHANNEL: "#fleet-training-runs"
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ "${{ github.event.inputs.skip_smoke }}" = "true" ]; then
            ARGS="$ARGS --skip-smoke"
          fi
          if [ "${{ github.event.inputs.ignore_seed }}" = "true" ]; then
            ARGS="$ARGS --ignore-seed"
          fi
          if [ -n "${{ github.event.inputs.team_id }}" ]; then
            ARGS="$ARGS --team-id ${{ github.event.inputs.team_id }}"
          fi
          if [ -n "${{ github.event.inputs.modality }}" ]; then
            ARGS="$ARGS --modality ${{ github.event.inputs.modality }}"
          fi
          MAX_D="${{ github.event.inputs.max_datasets }}"
          if [ -n "$MAX_D" ] && [ "$MAX_D" != "0" ]; then
            ARGS="$ARGS --max-datasets $MAX_D"
          fi
          python -m integrations.fleet.auto_train trigger $ARGS

      - name: Print state on completion
        if: always()
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: python -m integrations.fleet.auto_train status || true

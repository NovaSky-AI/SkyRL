name: SkyRL-GPU

on:
  push:
    branches: [ main ]
    paths:
      - 'ci/**'
      - 'skyrl/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/gpu_skyrl.yaml'
  pull_request:
    paths:
      - 'ci/**'
      - 'skyrl/**'
      - 'tests/**'
      - 'pyproject.toml'
      - '.github/workflows/gpu_skyrl.yaml'
  workflow_dispatch:

permissions:
  checks: write
  contents: read

concurrency:
  group: skyrl-gpu-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skyrl_gpu_tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: .

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install the latest version of uv
        uses: astral-sh/setup-uv@v6
        with:
          activate-environment: true
      - name: Install dependencies
        run: uv pip install anyscale==0.24.79 typer==0.9.0
      - name: Check GPU test credentials
        id: gpu_test_credentials
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
        run: |
          if [[ -n "${ANYSCALE_CLI_TOKEN}" ]]; then
            echo "can_run=true" >> "${GITHUB_OUTPUT}"
          else
            echo "can_run=false" >> "${GITHUB_OUTPUT}"
          fi
      - name: Skip GPU tests for PRs without Anyscale credentials
        if: steps.gpu_test_credentials.outputs.can_run != 'true'
        run: |
          echo "Skipping SkyRL GPU tests because ANYSCALE_CLI_TOKEN is unavailable."
          echo "This commonly happens on fork PRs where GitHub Actions does not expose repository secrets."
      - name: GPU tests
        if: steps.gpu_test_credentials.outputs.can_run == 'true'
        env:
          ANYSCALE_CLI_TOKEN: ${{ secrets.ANYSCALE_CLI_TOKEN }}
          ANYSCALE_HOST: https://console.anyscale.com
        run: |
          anyscale job submit -f ci/anyscale_gpu_ci.yaml --timeout 10000
          anyscale job wait --cloud sky-anyscale-aws-us-east-1 --name skyrl-tx-gpu-ci --timeout 10000

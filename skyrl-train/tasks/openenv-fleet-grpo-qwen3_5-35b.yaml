# Fleet Task GRPO Training via SkyPilot - Qwen3.5-35B-A3B (MoE, Multi-Node)
# Usage: sky launch tasks/openenv-fleet-grpo-qwen3_5-35b.yaml --env FLEET_API_KEY=<key> --env WANDB_API_KEY=<key>
#
# MoE: 35B total, 3B active (256 experts, 9 active/token). GatedDeltaNet architecture.
# 262K native context. All 35B params in memory (~70GB fp16), optimizer ~140GB, gradients ~70GB.
#
# Multi-node (2-node default, 16 GPUs total): 8x B200/H200 per node
# NOTE: Requires vLLM >= 0.17.0 for native Qwen3.5/GDN support + FlashAttention 4

name: fleet-task-grpo-qwen3-5-35b

resources:
  disk_size: 750
  memory: 1500+
  ports: 6479
  any_of:
    # GKE with GPUDirect-RDMA (fleet-rdma cluster, 3200 Gbps inter-node, spot)
    - accelerators: H200:8
      cloud: kubernetes
      network_tier: best
      use_spot: true
    - accelerators: B200:8
      cloud: kubernetes
      network_tier: best
      use_spot: true
    - accelerators: H200-SXM:8
      cloud: runpod
    - accelerators: B200:8
      cloud: runpod
    - accelerators: B200:8
      cloud: lambda
    - accelerators: H200-SXM:8
      cloud: vast
    - accelerators: B200:8
      cloud: nebius
    - accelerators: H200-SXM:8
      cloud: nebius
    - accelerators: B200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305

num_nodes: 2

workdir:
  url: https://github.com/fleet-ai/SkyRL.git
  ref: main

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  DATA_VERSION: "v55"
  ENV_KEYS: ""
  DIFFICULTY: ""
  MODALITY: "tool_use"
  MAX_TURNS: 50
  MAX_INPUT_LENGTH: 96000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 20
  RUN_ID: ""
  MAX_TASKS: ""
  RESUME_RUN_NAME: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  # TP=2 → 8 engines (each uses 2 GPUs) to match 16 policy GPUs with colocate_all
  NUM_INFERENCE_ENGINES: 8

setup: |
  bash skyrl-train/scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup skyrl-train/scripts/fleet-qwen35-extra-setup.sh

run: |
  bash skyrl-train/scripts/fleet-common-run.sh \
    --use-python-direct --cuda-env "$HOME/.cuda_env" \
    --set-ulimit --no-pytorch-alloc-conf \
    --nccl-heartbeat 1800 -- \
    environment.skyrl_gym.fleet_task.ttl_seconds=900 \
    environment.skyrl_gym.fleet_task.partial_reward=true \
    trainer.algorithm.advantage_estimator=grpo \
    trainer.policy.model.path="Qwen/Qwen3.5-35B-A3B" \
    trainer.flash_attn=true \
    trainer.loss_chunk_size=4096 \
    trainer.use_sample_packing=false \
    +generator.chat_template_kwargs='{enable_thinking:true}' \
    generator.inference_engine_tensor_parallel_size=2 \
    trainer.epochs=${NUM_EPOCHS} \
    trainer.eval_batch_size=8 \
    trainer.eval_before_train=true \
    trainer.eval_interval=20 \
    trainer.update_epochs_per_batch=1 \
    trainer.train_batch_size=16 \
    trainer.use_hybrid_env_sampling=true \
    trainer.min_samples_per_env=1 \
    trainer.policy_mini_batch_size=16 \
    trainer.micro_forward_batch_size_per_gpu=1 \
    trainer.micro_train_batch_size_per_gpu=1 \
    trainer.ckpt_interval=10 \
    trainer.max_ckpts_to_keep=1 \
    trainer.max_prompt_length=2048 \
    generator.max_input_length=$MAX_INPUT_LENGTH \
    generator.sampling_params.max_generate_length=$MAX_GENERATE_LENGTH \
    generator.sampling_params.temperature=0.9 \
    generator.sampling_params.top_p=0.95 \
    'generator.sampling_params.stop=["</tool_call>"]' \
    'generator.eval_sampling_params.stop=["</tool_call>"]' \
    trainer.policy.optimizer_config.lr=5.0e-7 \
    trainer.algorithm.use_kl_loss=true \
    generator.max_turns=$MAX_TURNS \
    generator.backend=$INFERENCE_BACKEND \
    generator.run_engines_locally=true \
    generator.weight_sync_backend=nccl \
    generator.async_engine=true \
    generator.batched=false \
    generator.use_conversation_multi_turn=true \
    generator.n_samples_per_prompt=8 \
    generator.eval_n_samples_per_prompt=3 \
    generator.enforce_eager=false \
    generator.gpu_memory_utilization=0.65 \
    trainer.logger="$LOGGER" \
    trainer.project_name="fleet-task-grpo" \
    trainer.run_name="fleet_qwen35_35b_${MODALITY}_${RUN_ID:-$(head -c 4 /dev/urandom | xxd -p)}" \
    trainer.resume_mode=latest \
    trainer.ckpt_path="$HOME/ckpts/fleet_qwen35_35b_${MODALITY}" \
    trainer.export_path="$HOME/exports" \
    trainer.dump_data_batch=true

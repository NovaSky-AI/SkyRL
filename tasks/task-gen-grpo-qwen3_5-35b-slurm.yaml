# Task Generation GRPO Training via SkyPilot - Qwen3.5-35B-A3B — Slurm-only variant
# Identical to task-gen-grpo-qwen3_5-35b.yaml but with ports removed so SkyPilot's
# Slurm backend doesn't reject the file (ports are not needed on Slurm).
#
# Usage:
#   sky launch tasks/task-gen-grpo-qwen3_5-35b-slurm.yaml \
#     --infra slurm/runpod-cluster-y8puzql3juawue \
#     --env FLEET_API_KEY=<key> --env WANDB_API_KEY=<key> \
#     --env OPENROUTER_API_KEY=<key> \
#     --env AWS_ACCESS_KEY_ID=<key> --env AWS_SECRET_ACCESS_KEY=<key>

name: task-gen-grpo-qwen3-5-35b

resources:
  disk_size: 750
  memory: 1500+
  accelerators: H200:8
  cloud: slurm
  region: runpod-cluster-y8puzql3juawue

num_nodes: 2

workdir: .

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  DATA_VERSION: "v55"
  MODALITY: "tool_use"
  MAX_TURNS: 10
  MAX_INPUT_LENGTH: 72000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 20
  JUDGE_MODEL: "anthropic/claude-sonnet-4.5"
  OPENROUTER_API_KEY: ""
  EVALUATOR_MODEL: "anthropic/claude-sonnet-4.5"
  K_ROLLOUTS: 4
  ALPHA: "1.0"
  MAX_EVAL_STEPS: 20
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  NUM_INFERENCE_ENGINES: 8

setup: |
  pkill -9 -f gcs_server 2>/dev/null || true
  pkill -9 -f 'raylet ' 2>/dev/null || true
  pkill -9 -f 'ray::' 2>/dev/null || true
  pkill -9 -f 'ray.dashboard' 2>/dev/null || true
  pkill -9 -f 'log_monitor' 2>/dev/null || true
  fuser -k 6479/tcp 2>/dev/null || true
  sleep 5
  rm -rf /tmp/ray 2>/dev/null || true
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh \
    --env-class task_gen

run: |
  bash scripts/fleet-task-gen-35b-run.sh

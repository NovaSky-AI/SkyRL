# Fleet 35B VL Browser-Use GRPO Training via SkyPilot
# Usage: sky launch tasks/openenv-fleet-grpo-qwen3_5-35b-vl.yaml --env FLEET_API_KEY=<key> --env WANDB_API_KEY=<key>
#
# Qwen3.5-35B-A3B with vision enabled for browser_use environments.
# Based on the text-only 35B config with multimodal support (language_model_only=false).
#
# Multi-node (2-node, 16 GPUs total): 8x H200 per node, TP=2
# NOTE: Requires vLLM >= 0.17.0 for native Qwen3.5/GDN support + FlashAttention 4

name: fleet-35b-vl-grpo-browser-use

resources:
  disk_size: 750
  memory: 1500+
  ports: 6479
  ordered:
    # RunPod reserved H200s (priority)
    - accelerators: H200:8
      cloud: runpod
    # GCP fallback
    - accelerators: H200:8
      cloud: gcp
      use_spot: true
      image_id: projects/deeplearning-platform-release/global/images/common-cu128-ubuntu-2204-nvidia-570-v20260305
    # Other providers
    - accelerators: H200:8
      cloud: lambda
    - accelerators: H200:8
      cloud: nebius

num_nodes: 2

workdir:
  url: https://github.com/fleet-ai/SkyRL-v2.git
  ref: main

envs:
  WANDB_API_KEY: ""
  FLEET_API_KEY: ""
  LOGGER: "wandb"
  INFERENCE_BACKEND: "vllm"
  DATA_VERSION: "v6"
  ENV_KEYS: ""
  DIFFICULTY: ""
  MODALITY: "browser_use"
  MAX_TURNS: 80
  MAX_INPUT_LENGTH: 80000
  MAX_GENERATE_LENGTH: 4096
  NUM_EPOCHS: 10
  RUN_ID: ""
  MAX_TASKS: ""
  RESUME_RUN_NAME: ""
  AWS_ACCESS_KEY_ID: ""
  AWS_SECRET_ACCESS_KEY: ""
  AWS_REGION: "us-east-1"
  S3_DATASET_BUCKET: "fleet-internal-datasets"
  S3_CHECKPOINT_BUCKET: "skyrl-checkpoints"
  S3_TRAJECTORY_BUCKET: "skyrl-trajectories"
  # TP=2 -> 8 engines (each uses 2 GPUs) to match 16 policy GPUs with colocate_all
  NUM_INFERENCE_ENGINES: 8

setup: |
  bash scripts/fleet-common-setup.sh \
    --openenv-branch deniz/fleet_client \
    --extra-setup scripts/fleet-qwen35-extra-setup.sh

run: |
  bash scripts/fleet-35b-vl-run.sh
